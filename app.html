<script>

let materiais = [];

let dashboardAtual = null;


document.addEventListener(
"DOMContentLoaded",
()=>{


carregarUsuario();


carregarDashboard();


configurarCadastro();


configurarEventos();


});




function carregarUsuario(){


google.script.run

.withSuccessHandler(usuario=>{


document
.getElementById(
"user-display"
)
.innerHTML =

usuario.nome;



})

.withFailureHandler(
erro=>{


alert(
erro.message
);


})

.apiUsuario();



}


function navegar(
pagina
){



document
.querySelectorAll(
".app-view"
)
.forEach(
el=>el.classList.add("d-none")
);



document
.getElementById(
"view-"+pagina
)
.classList.remove(
"d-none"
);



document
.querySelectorAll(
".nav-link"
)
.forEach(
el=>el.classList.remove(
"active"
)
);



const botao =
document.getElementById(
"btn-nav-"+pagina
);



if(botao)
botao.classList.add(
"active"
);



if(
pagina==="dashboard"
){

carregarDashboard();

}



if(
pagina==="estoque"
){

carregarEstoque();

}



if(
pagina==="movimentacao"
){

carregarMateriaisSelect();

}



}



function carregarDashboard(){


mostrarLoading(true);



google.script.run


.withSuccessHandler(
dados=>{


dashboardAtual=dados;



document
.getElementById(
"dash-total-materiais"
)
.innerHTML =
dados.cards.materiais;



document
.getElementById(
"dash-itens-zerados"
)
.innerHTML =
dados.cards.zerados;



document
.getElementById(
"dash-itens-baixo"
)
.innerHTML =
dados.cards.baixo;



document
.getElementById(
"dash-valor-total"
)
.innerHTML =

formatarMoeda(
dados.cards.valorTotal
);



preencherHistoricoDashboard(
dados.atividadeRecente
);



mostrarLoading(false);



})

.withFailureHandler(
erro=>{


mostrarErro(
erro.message
);


mostrarLoading(false);



})


.apiDashboard();



}




function preencherHistoricoDashboard(
lista
){


const tbody =
document.getElementById(
"dash-tabela-historico"
);



tbody.innerHTML="";



if(
!lista ||
lista.length===0
){


tbody.innerHTML=`

<tr>

<td colspan="6"
class="text-center text-muted">

Nenhuma movimentação

</td>

</tr>

`;

return;


}



lista.forEach(
item=>{


tbody.innerHTML += `

<tr>

<td>${item.data}</td>

<td>${item.tipo}</td>

<td>${item.codigo}</td>

<td>${item.descricao}</td>

<td class="text-center">

${item.quantidade}

</td>

<td>${item.usuario}</td>

</tr>

`;



});



}



function carregarEstoque(){


google.script.run


.withSuccessHandler(
lista=>{


materiais=lista;


renderizarEstoque(
lista
);


})

.apiListarMateriais();



}




function renderizarEstoque(
lista
){


const tbody =
document.getElementById(
"tabela-itens-estoque"
);



tbody.innerHTML="";



lista.forEach(
item=>{


tbody.innerHTML += `

<tr>


<td>${item.codigo}</td>


<td>${item.descricao}</td>


<td class="text-end">

${item.quantidadeIdeal}

</td>


<td class="text-end">

${item.quantidadeAtual}

</td>


<td class="text-end">

${formatarMoeda(item.precoUnitario)}

</td>


<td class="text-end">

${formatarMoeda(item.precoTotal)}

</td>


</tr>

`;



});


}



function filtrarCatalogoEstoque(){


const texto =
document
.getElementById(
"txt-pesquisa-estoque"
)
.value
.toLowerCase();



const filtrado =
materiais.filter(
m=>

m.codigo
.toLowerCase()
.includes(texto)

||

m.descricao
.toLowerCase()
.includes(texto)

);



renderizarEstoque(
filtrado
);



}



function carregarMateriaisSelect(){


google.script.run


.withSuccessHandler(
lista=>{


const select =
document
.getElementById(
"mov-codigo"
);



select.innerHTML =
`
<option value="">
Selecione
</option>
`;



lista.forEach(
m=>{


select.innerHTML += `

<option value="${m.codigo}">

${m.codigo} -
${m.descricao}

</option>

`;



});


})

.apiListarMateriais();



}


function salvarMovimento(
event
){


event.preventDefault();



const tipo =
document
.getElementById(
"mov-tipo"
)
.value;



const codigo =
document
.getElementById(
"mov-codigo"
)
.value;



const quantidade =
Number(
document
.getElementById(
"mov-quantidade"
)
.value
);



const observacao =
document
.getElementById(
"mov-obs"
)
.value;



let funcao;



if(tipo==="ENTRADA"){


funcao="apiEntrada";


}
else{


funcao="apiSaida";


}


google.script.run


.withSuccessHandler(
res=>{


if(
res.sucesso
){


mostrarSucesso(
res.mensagem
);



document
.getElementById(
"form-movimentacao"
)
.reset();



carregarDashboard();



}

else{


mostrarErro(
res.mensagem
);


}



})


.withFailureHandler(
erro=>{


mostrarErro(
erro.message
);


})

[funcao](

codigo,

quantidade,

observacao

);



}



function configurarCadastro(){


const form =
document
.getElementById(
"form-novo-material"
);



if(!form)
return;



form.addEventListener(
"submit",
e=>{

e.preventDefault();


const material={


codigo:
document
.getElementById(
"mat-codigo"
)
.value,


descricao:
document
.getElementById(
"mat-descricao"
)
.value,


quantidadeAtual:
document
.getElementById(
"mat-quantidade"
)
.value,


quantidadeIdeal:5,


precoUnitario:
document
.getElementById(
"mat-preco"
)
.value


};


google.script.run


.withSuccessHandler(
res=>{


mostrarSucesso(
"Material cadastrado."
);


carregarEstoque();



})


.apiAdicionarMaterial(
material
);



});



}


function formatarMoeda(
valor
){


return Number(valor)

.toLocaleString(
"pt-BR",
{

style:"currency",

currency:"BRL"

}

);



}



function mostrarLoading(
estado
){


const el =
document
.getElementById(
"loading-overlay"
);



if(el)
el.style.display =
estado
?
"block"
:
"none";



}



function mostrarSucesso(
msg
){

alert(
"✅ "+msg
);

}



function mostrarErro(
msg
){

alert(
"❌ "+msg
);

}


function configurarEventos(){


}


</script>
